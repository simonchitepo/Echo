name: echo
description: "Echo - proximity-based anti-algorithm social network (Here & Now)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # LAN discovery (Windows/macOS/Linux + Android/iOS)
  nsd: ^4.1.0

  # Profile photo upload (gallery/camera)
  image_picker: ^1.0.7

  # Permissions & device capabilities
  permission_handler: ^11.3.1
  geolocator: ^12.0.0

  # Proximity networking (Android-focused)
  nearby_connections: ^4.3.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^10.0.0
  # LAN comms (Web + Desktop client)
  web_socket_channel: ^2.4.5

  # Desktop WebSocket server (Windows/macOS/Linux host)
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.0

  # Local persistence
  shared_preferences: ^2.2.3

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  msix: ^3.16.7

# ---------------------------
# App Icons
# ---------------------------
flutter_launcher_icons:
  android: true
  ios: true
  web: true
  image_path: assets/app_icon.png
  web_image_mode: contain
  web_icon_background_color: "#000000"
  web_icon_theme_color: "#000000"
  min_sdk_android: 21
  remove_alpha_ios: true
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"

# ---------------------------
# Flutter Assets
# ---------------------------
flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png
    - assets/echo_logo.png

# ---------------------------
# MSIX CONFIGURATION (Windows)
# ---------------------------
msix_config:
  display_name: echo chat
  publisher_display_name: cyph3r
  identity_name: cyph3r.echochat
  publisher: CN=7456A62D-B4E5-49F3-9485-ADF80146DE6A
  msix_version: 0.1.0.0
  logo_path: assets/app_icon.png
  store: true
  store_id: 9N25SH60Z8QM